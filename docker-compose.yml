services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: production
      DATABASE_URL: mongodb://mongodb:27017/ev-charging
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      CLIENT_URL: http://localhost:8080
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5001/api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo_data:
